<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — AURON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0B0B0B;
      color: #F8F8F8;
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 2rem; font-weight: 800; letter-spacing: .12em; color: #D4AF37; margin-bottom: 2rem; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: .75rem; }
    p  { color: #666; font-size: .9rem; line-height: 1.7; max-width: 320px; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      background: #D4AF37;
      color: #000;
      font-weight: 700;
      padding: .7rem 1.75rem;
      border-radius: 8px;
      font-size: .9rem;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
  </style>
</head>
<body>
  <div class="logo">AURON</div>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>No internet connection detected. Check your connection and try again — your streak is counting on you.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
