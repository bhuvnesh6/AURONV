{% extends "base.html" %}
{% block title %}Sign Up — AURON{% endblock %}
{% block public_content %}
<div class="auth-page">
  <div class="auth-card auth-card-wide">
    <div class="auth-logo"><span class="logo-text">AURON</span></div>
    <h2 class="auth-title">Create Athlete Account</h2>
    <p class="auth-sub">Start your accountability journey</p>

    <form method="POST" action="/signup/user" class="auth-form">
      <div class="form-grid-2">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" required placeholder="your_handle" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" name="phone" placeholder="+91 98765 43210" />
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select name="gender">
            <option value="">Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="Min 8 characters" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" required placeholder="Repeat password" />
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="number" name="age" placeholder="25" min="13" max="100" />
        </div>
        <div class="form-group">
          <label>Fitness Goal</label>
          <select name="goal">
            <option value="">Select goal</option>
            <option value="lose_fat">Lose Fat</option>
            <option value="build_muscle">Build Muscle</option>
            <option value="maintain">Maintain</option>
            <option value="performance">Performance</option>
          </select>
        </div>
        <div class="form-group">
          <label>Weight (kg)</label>
          <input type="number" name="weight" placeholder="75" step="0.1" />
        </div>
        <div class="form-group">
          <label>Height (cm)</label>
          <input type="number" name="height" placeholder="175" />
        </div>
      </div>
      <button type="submit" class="btn btn-gold btn-block" style="margin-top:1.5rem">Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="/login">Sign in</a></p>
    <p class="auth-footer">Are you a trainer? <a href="/signup/trainer">Trainer signup</a></p>
  </div>
</div>
{% endblock %}
