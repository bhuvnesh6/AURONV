{% extends "base.html" %}
{% block title %}Login — AURON{% endblock %}
{% block public_content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-text">AURON</span></div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in with your email — we'll find your account automatically</p>

    <form method="POST" action="/login" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="your@email.com" autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••" />
      </div>
      <div class="form-row-space">
        <label class="checkbox-label">
          <input type="checkbox" name="remember_me" /> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-gold btn-block">Sign In</button>
    </form>

    <p class="auth-footer">
      New athlete? <a href="/signup/user">Create account</a> &nbsp;·&nbsp;
      Trainer? <a href="/signup/trainer">Trainer signup</a>
    </p>
  </div>
</div>
{% endblock %}
