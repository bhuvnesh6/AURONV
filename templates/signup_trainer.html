{% extends "base.html" %}
{% block title %}Trainer Signup — AURON{% endblock %}
{% block public_content %}
<div class="auth-page">
  <div class="auth-card auth-card-wide">
    <div class="auth-logo"><span class="logo-text">AURON</span></div>
    <h2 class="auth-title">Create Trainer Account</h2>
    <p class="auth-sub">Manage your athletes, track compliance</p>

    <form method="POST" action="/signup/trainer" class="auth-form">
      <div class="form-grid-2">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" required placeholder="your_handle" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" name="phone" placeholder="+91 98765 43210" />
        </div>
        <div class="form-group">
          <label>Business Name</label>
          <input type="text" name="business_name" placeholder="Elite Fitness Co." />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="Min 8 characters" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" required placeholder="Repeat password" />
        </div>
        <div class="form-group">
          <label>Instagram Handle</label>
          <input type="text" name="instagram" placeholder="@yourhandle" />
        </div>
        <div class="form-group">
          <label>Years of Experience</label>
          <input type="number" name="years_experience" placeholder="5" min="0" max="50" />
        </div>
        <div class="form-group form-full">
          <label>Specialization</label>
          <select name="specialization">
            <option value="">Select specialization</option>
            <option value="strength">Strength & Powerlifting</option>
            <option value="bodybuilding">Bodybuilding</option>
            <option value="crossfit">CrossFit</option>
            <option value="weight_loss">Weight Loss</option>
            <option value="sports">Sports Performance</option>
            <option value="general">General Fitness</option>
          </select>
        </div>
        <div class="form-group">
          <label>Country</label>
          <select id="selCountry" onchange="onLocCountryChange(this)">
            <option value="">Select Country</option>
          </select>
          <input type="hidden" name="country" id="hidCountry" />
        </div>
        <div class="form-group">
          <label>State</label>
          <select id="selState" onchange="onLocStateChange(this)">
            <option value="">Select State</option>
          </select>
          <input type="hidden" name="state" id="hidState" />
        </div>
        <div class="form-group">
          <label>City</label>
          <select id="selCity" onchange="onLocCityChange(this)">
            <option value="">Select City</option>
          </select>
          <input type="hidden" name="city" id="hidCity" />
        </div>
      </div>
      <button type="submit" class="btn btn-gold btn-block" style="margin-top:1.5rem">Create Trainer Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="/login">Sign in</a></p>
    <p class="auth-footer">Are you an athlete? <a href="/signup/user">Athlete signup</a></p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
/* ══════════════════════════════════════════════════════════════
   Location select cascade (Country → State → City)
   Selects use CODE as value (reliable for fetching next level).
   Hidden inputs carry the human-readable NAME that actually gets
   submitted to the backend (e.g. "India", "Maharashtra", "Mumbai").
   ══════════════════════════════════════════════════════════════ */

async function locLoadCountries() {
  const sel = document.getElementById('selCountry');
  if (!sel) return;
  try {
    const r = await fetch('/static/locations/countries.json');
    const countries = await r.json();           // [{code, name, emoji}, …]
    countries.forEach(c => {
      sel.appendChild(new Option(c.name, c.code));
    });
  } catch(e) { console.warn('Could not load countries', e); }
}

async function locLoadStates(countryCode) {
  const sel = document.getElementById('selState');
  if (!sel) return;
  sel.innerHTML = '<option value="">Select State</option>';
  if (!countryCode) return;
  try {
    const r = await fetch(`/static/locations/${countryCode}/states.json`);
    if (!r.ok) return;
    const states = await r.json();               // [{code, name}, …]
    states.forEach(s => sel.appendChild(new Option(s.name, s.code)));
  } catch(e) { console.warn('No states for', countryCode, e); }
}

async function locLoadCities(countryCode, stateCode) {
  const sel = document.getElementById('selCity');
  if (!sel) return;
  sel.innerHTML = '<option value="">Select City</option>';
  if (!stateCode) return;
  try {
    const r = await fetch(`/static/locations/${countryCode}/${stateCode}.json`);
    if (!r.ok) return;
    const cities = await r.json();               // ["Toronto", "Vancouver", …] OR [{name}, …]
    cities.forEach(c => {
      const name = typeof c === 'string' ? c : c.name;
      sel.appendChild(new Option(name, name));
    });
  } catch(e) { console.warn('No cities for', stateCode, e); }
}

function onLocCountryChange(sel) {
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('hidCountry').value = opt && opt.value ? opt.text : '';
  document.getElementById('hidState').value = '';
  document.getElementById('hidCity').value = '';
  document.getElementById('selCity').innerHTML = '<option value="">Select City</option>';
  locLoadStates(opt ? opt.value : '');
}

function onLocStateChange(sel) {
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('hidState').value = opt && opt.value ? opt.text : '';
  document.getElementById('hidCity').value = '';
  const countryCode = document.getElementById('selCountry').value;
  locLoadCities(countryCode, opt ? opt.value : '');
}

function onLocCityChange(sel) {
  document.getElementById('hidCity').value = sel.value;
}

locLoadCountries();
</script>
{% endblock %}
