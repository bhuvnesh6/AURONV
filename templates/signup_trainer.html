{% extends "base.html" %}
{% block title %}Trainer Signup — AURON{% endblock %}
{% block public_content %}
<div class="auth-page">
  <div class="auth-card auth-card-wide">
    <div class="auth-logo"><span class="logo-text">AURON</span></div>
    <h2 class="auth-title">Create Trainer Account</h2>
    <p class="auth-sub">Manage your athletes, track compliance</p>

    <form method="POST" action="/signup/trainer" class="auth-form">
      <div class="form-grid-2">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" required placeholder="your_handle" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" name="phone" placeholder="+91 98765 43210" />
        </div>
        <div class="form-group">
          <label>Business Name</label>
          <input type="text" name="business_name" placeholder="Elite Fitness Co." />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="Min 8 characters" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" required placeholder="Repeat password" />
        </div>
        <div class="form-group">
          <label>Instagram Handle</label>
          <input type="text" name="instagram" placeholder="@yourhandle" />
        </div>
        <div class="form-group">
          <label>Years of Experience</label>
          <input type="number" name="years_experience" placeholder="5" min="0" max="50" />
        </div>
        <div class="form-group form-full">
          <label>Specialization</label>
          <select name="specialization">
            <option value="">Select specialization</option>
            <option value="strength">Strength & Powerlifting</option>
            <option value="bodybuilding">Bodybuilding</option>
            <option value="crossfit">CrossFit</option>
            <option value="weight_loss">Weight Loss</option>
            <option value="sports">Sports Performance</option>
            <option value="general">General Fitness</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn btn-gold btn-block" style="margin-top:1.5rem">Create Trainer Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="/login">Sign in</a></p>
    <p class="auth-footer">Are you an athlete? <a href="/signup/user">Athlete signup</a></p>
  </div>
</div>
{% endblock %}
